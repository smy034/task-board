<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一般常識クイズ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>一般常識クイズ</h1>
    </header>

    <main id="quiz-screen">
      <div class="progress">
        <span id="progress-text">問題 1 / 5</span>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <div class="question-card">
        <p id="question-text" class="question-text"></p>
        <div id="choices" class="choices"></div>
        <div id="feedback" class="feedback hidden"></div>
        <button id="next-btn" class="next-btn hidden">次の問題へ →</button>
      </div>
    </main>

    <div id="result-screen" class="hidden">
      <div class="result-card">
        <div class="result-icon" id="result-icon"></div>
        <h2>クイズ終了！</h2>
        <p class="score-label">あなたのスコア</p>
        <p class="score" id="score-display"></p>
        <p class="score-fraction" id="score-fraction"></p>
        <p class="perfect-message hidden" id="perfect-message">100点満点です。おめでとう！</p>
        <p class="score-message" id="score-message"></p>
        <button id="retry-btn" class="retry-btn">もう一度挑戦する</button>
      </div>
    </div>
  </div>

  <canvas id="confetti-canvas" class="hidden"></canvas>

  <script src="script.js"></script>
</body>
</html>
